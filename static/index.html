<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">KB Chatbot</span>
        <button class="new-chat-btn" id="newChatBtn" title="New chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="sessions-label">Recent chats</div>
      <ul class="session-list" id="sessionList"></ul>
    </aside>

    <!-- Main chat area -->
    <main class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcomeMsg">
          <div class="welcome-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2>How can I help you today?</h2>
          <p>Ask anything about the knowledge base documents.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="userInput"
            placeholder="Message KB Chatbot..."
            rows="1"
            onInput="autoResize(this)"
            onKeyDown="handleKey(event)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Responses are based on uploaded knowledge base documents.</p>
      </div>
    </main>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
    <img id="lightboxImg" src="" alt="Preview" />
  </div>

  <script src="/script.js"></script>
</body>
</html>
